<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShiftFlow</title>

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f5f9;
    color:#1e293b;
}

/* ===== LAYOUT ===== */

.app{
    display:flex;
    min-height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:320px;
    background:#0f172a;
    color:white;
    padding:20px;
    overflow-y:auto;
}

.logo{
    font-size:28px;
    font-weight:bold;
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
}

.sidebar input,
.sidebar textarea,
.sidebar button{
    width:100%;
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:15px;
}

.sidebar input,
.sidebar textarea{
    background:white;
}

.sidebar textarea{
    resize:vertical;
    min-height:80px;
}

.add-btn{
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.2s;
    margin-top:10px;
}

.add-btn:hover{
    background:#1d4ed8;
}

.clear-btn{
    background:#dc2626;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.clear-btn:hover{
    background:#b91c1c;
}

/* ===== MAIN ===== */

.main{
    flex:1;
    padding:20px;
    overflow-x:auto;
}

/* ===== HEADER ===== */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.header h1{
    font-size:30px;
}

.nav-btn{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    font-size:15px;
}

.nav-btn:hover{
    background:#1d4ed8;
}

/* ===== CALENDAR ===== */

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    min-width:700px;
}

.day-name{
    background:#dbeafe;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.day{
    background:white;
    border-radius:12px;
    min-height:130px;
    padding:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

.empty{
    background:transparent;
    box-shadow:none;
}

.day-number{
    font-weight:bold;
    margin-bottom:8px;
}

.event{
    background:#2563eb;
    color:white;
    border-radius:8px;
    padding:6px;
    margin-bottom:5px;
    font-size:13px;
    position:relative;
    word-wrap:break-word;
}

.event small{
    display:block;
    margin-top:4px;
}

.delete-btn{
    position:absolute;
    right:6px;
    top:4px;
    cursor:pointer;
    font-weight:bold;
}

/* ===== TABLET ===== */

@media(max-width:992px){

    .app{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .main{
        width:100%;
    }
}

/* ===== MOBILE ===== */

@media(max-width:768px){

    .header{
        flex-direction:column;
        align-items:stretch;
        text-align:center;
    }

    .header h1{
        font-size:24px;
    }

    .calendar{
        grid-template-columns:repeat(2,1fr);
        min-width:100%;
    }

    .day-name{
        font-size:14px;
        padding:10px;
    }

    .day{
        min-height:110px;
    }

    .event{
        font-size:12px;
    }
}

/* ===== VERY SMALL DEVICES ===== */

@media(max-width:480px){

    .calendar{
        grid-template-columns:1fr;
    }

    .sidebar{
        padding:15px;
    }

    .main{
        padding:10px;
    }

    .header h1{
        font-size:20px;
    }

    .nav-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">ShiftFlow</div>

        <div class="form-group">
            <label>Працівник</label>
            <input type="text" id="employeeName"
            placeholder="Введіть ім'я">
        </div>

        <div class="form-group">
            <label>Дата перезмінки</label>
            <input type="date" id="shiftDate">
        </div>

        <div class="form-group">
            <label>Примітка</label>
            <textarea id="note"
            placeholder="Додаткова інформація"></textarea>
        </div>

        <button class="add-btn"
        onclick="addShift()">
            Додати
        </button>

        <button class="clear-btn"
        onclick="clearAllData()">
            Очистити всі дані
        </button>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="header">

            <button class="nav-btn"
            onclick="prevMonth()">
                ← Попередній
            </button>

            <h1 id="monthYear"></h1>

            <button class="nav-btn"
            onclick="nextMonth()">
                Наступний →
            </button>

        </div>

        <div class="calendar" id="calendar"></div>

    </main>

</div>

<script>

/* ===== ELEMENTS ===== */

const calendar =
document.getElementById("calendar");

const monthYear =
document.getElementById("monthYear");

/* ===== DATE ===== */

let currentDate = new Date();

/* ===== STORAGE ===== */

let shifts =
JSON.parse(localStorage.getItem("shifts"))
|| [];

/* ===== MONTHS ===== */

const months = [
"Січень","Лютий","Березень","Квітень",
"Травень","Червень","Липень","Серпень",
"Вересень","Жовтень","Листопад","Грудень"
];

/* ===== SAVE ===== */

function saveData(){

    localStorage.setItem(
        "shifts",
        JSON.stringify(shifts)
    );
}

/* ===== RENDER ===== */

function renderCalendar(){

    calendar.innerHTML = "";

    const year =
    currentDate.getFullYear();

    const month =
    currentDate.getMonth();

    monthYear.textContent =
    `${months[month]} ${year}`;

    const firstDay =
    new Date(year, month, 1).getDay();

    const daysInMonth =
    new Date(year, month + 1, 0).getDate();

    const dayNames = [
        "Пн","Вт","Ср",
        "Чт","Пт","Сб","Нд"
    ];

    dayNames.forEach(day => {

        const dayName =
        document.createElement("div");

        dayName.classList.add("day-name");

        dayName.textContent = day;

        calendar.appendChild(dayName);
    });

    let startDay =
    firstDay === 0 ? 6 : firstDay - 1;

    for(let i = 0; i < startDay; i++){

        const empty =
        document.createElement("div");

        empty.classList.add("day", "empty");

        calendar.appendChild(empty);
    }

    for(let day = 1;
        day <= daysInMonth;
        day++){

        const dayDiv =
        document.createElement("div");

        dayDiv.classList.add("day");

        const dayNumber =
        document.createElement("div");

        dayNumber.classList.add("day-number");

        dayNumber.textContent = day;

        dayDiv.appendChild(dayNumber);

        const currentDayString =
        `${year}-${String(month + 1)
        .padStart(2,'0')}-${String(day)
        .padStart(2,'0')}`;

        shifts.forEach((shift,index)=>{

            if(shift.date === currentDayString){

                const event =
                document.createElement("div");

                event.classList.add("event");

                event.innerHTML = `
                    <span class="delete-btn"
                    onclick="deleteShift(${index})">
                    ×
                    </span>

                    <strong>${shift.name}</strong>

                    <small>${shift.note}</small>
                `;

                dayDiv.appendChild(event);
            }
        });

        calendar.appendChild(dayDiv);
    }
}

/* ===== ADD ===== */

function addShift(){

    const name =
    document.getElementById("employeeName")
    .value.trim();

    const date =
    document.getElementById("shiftDate")
    .value;

    const note =
    document.getElementById("note")
    .value.trim();

    if(name === "" || date === ""){

        alert("Заповніть ім'я та дату");

        return;
    }

    shifts.push({
        name,
        date,
        note
    });

    saveData();

    document.getElementById(
    "employeeName").value = "";

    document.getElementById(
    "shiftDate").value = "";

    document.getElementById(
    "note").value = "";

    renderCalendar();
}

/* ===== DELETE ===== */

function deleteShift(index){

    if(confirm("Видалити запис?")){

        shifts.splice(index,1);

        saveData();

        renderCalendar();
    }
}

/* ===== CLEAR ===== */

function clearAllData(){

    if(confirm(
    "Очистити весь календар?")){

        shifts = [];

        saveData();

        renderCalendar();
    }
}

/* ===== MONTH ===== */

function prevMonth(){

    currentDate.setMonth(
    currentDate.getMonth() - 1);

    renderCalendar();
}

function nextMonth(){

    currentDate.setMonth(
    currentDate.getMonth() + 1);

    renderCalendar();
}

/* ===== START ===== */

renderCalendar();

</script>

</body>
</html>
