<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ShiftFlow Cloud</title>

<!-- =========================
FIREBASE SDK
========================= -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    color:#1e293b;
    overflow-x:hidden;
}

/* =========================
MENU BUTTON
========================= */

.menu-btn{

    display:none;

    position:fixed;

    top:15px;
    left:15px;

    width:50px;
    height:50px;

    border:none;

    border-radius:14px;

    background:#2563eb;

    color:white;

    font-size:24px;

    cursor:pointer;

    z-index:1001;
}

/* =========================
APP
========================= */

.app{
    display:flex;
    min-height:100vh;
}

/* =========================
SIDEBAR
========================= */

.sidebar{

    width:320px;

    background:#0f172a;

    color:white;

    padding:20px;

    overflow-y:auto;

    transition:0.3s;

    z-index:999;
}

.logo{

    text-align:center;

    font-size:30px;

    font-weight:bold;

    margin-bottom:30px;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{

    display:block;

    margin-bottom:6px;

    font-size:14px;
}

.sidebar input,
.sidebar textarea,
.sidebar button{

    width:100%;

    border:none;

    border-radius:12px;

    padding:14px;

    font-size:15px;
}

.sidebar input,
.sidebar textarea{
    background:white;
}

.sidebar textarea{

    resize:vertical;

    min-height:90px;
}

.add-btn{

    background:#2563eb;

    color:white;

    cursor:pointer;

    margin-top:10px;
}

.clear-btn{

    background:#dc2626;

    color:white;

    cursor:pointer;

    margin-top:10px;
}

/* =========================
OVERLAY
========================= */

.sidebar-overlay{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.5);

    z-index:998;
}

.sidebar-overlay.active{
    display:block;
}

/* =========================
MAIN
========================= */

.main{

    flex:1;

    padding:20px;
}

/* =========================
HEADER
========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

    margin-bottom:20px;
}

.header h1{
    font-size:32px;
}

.nav-btn{

    background:#2563eb;

    color:white;

    border:none;

    border-radius:12px;

    padding:12px 18px;

    cursor:pointer;
}

/* =========================
CALENDAR
========================= */

.calendar{

    display:grid;

    grid-template-columns:repeat(7,1fr);

    gap:10px;
}

.day-name{

    background:#dbeafe;

    padding:12px;

    text-align:center;

    border-radius:12px;

    font-weight:bold;
}

.day{

    background:white;

    border-radius:14px;

    min-height:140px;

    padding:10px;

    box-shadow:
    0 2px 8px rgba(0,0,0,0.08);
}

.empty{
    background:transparent;
    box-shadow:none;
}

.day-number{

    font-weight:bold;

    margin-bottom:10px;
}

/* =========================
EVENT
========================= */

.event{

    background:#2563eb;

    color:white;

    border-radius:10px;

    padding:10px;

    margin-bottom:8px;

    position:relative;
}

.event strong{

    display:block;

    margin-bottom:4px;
}

.delete-btn{

    position:absolute;

    right:8px;
    top:4px;

    cursor:pointer;

    font-size:18px;
}

/* =========================
TABLET
========================= */

@media(max-width:992px){

    .menu-btn{
        display:block;
    }

    .sidebar{

        position:fixed;

        left:-100%;

        top:0;
        bottom:0;

        width:320px;

        max-width:90%;
    }

    .sidebar.active{
        left:0;
    }

    .main{

        width:100%;

        padding:
        80px 10px 20px 10px;
    }

    .calendar{

        grid-template-columns:
        repeat(2,1fr);
    }

    .header{

        flex-wrap:wrap;
    }

    .header h1{

        width:100%;

        text-align:center;
    }
}

/* =========================
SMARTPHONE
========================= */

@media(max-width:768px){

    .calendar{

        display:flex;

        flex-direction:column;
    }

    .day-name{
        display:none;
    }

    .empty{
        display:none;
    }

    .header{
        flex-direction:column;
    }

    .nav-btn{
        width:100%;
    }

    .day{
        min-height:auto;
    }
}

/* =========================
SMALL PHONE
========================= */

@media(max-width:480px){

    .sidebar{

        width:100%;

        max-width:100%;
    }

    .header h1{
        font-size:22px;
    }
}

</style>
</head>

<body>

<!-- =========================
MENU BUTTON
========================= -->

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<!-- =========================
OVERLAY
========================= -->

<div
class="sidebar-overlay"
onclick="closeSidebar()">
</div>

<div class="app">

<!-- =========================
SIDEBAR
========================= -->

<aside
class="sidebar"
id="sidebar">

<div class="logo">

ShiftFlow

</div>

<div class="form-group">

<label>

Працівник

</label>

<input
type="text"
id="employeeName"
placeholder="Введіть ім'я">

</div>

<div class="form-group">

<label>

Дата перезмінки

</label>

<input
type="date"
id="shiftDate">

</div>

<div class="form-group">

<label>

Примітка

</label>

<textarea
id="note"
placeholder="Додаткова інформація">
</textarea>

</div>

<button
class="add-btn"
onclick="addShift()">

Додати

</button>

<button
class="clear-btn"
onclick="clearAllData()">

Очистити календар

</button>

</aside>

<!-- =========================
MAIN
========================= -->

<main class="main">

<div class="header">

<button
class="nav-btn"
onclick="prevMonth()">

← Попередній

</button>

<h1 id="monthYear"></h1>

<button
class="nav-btn"
onclick="nextMonth()">

Наступний →

</button>

</div>

<div
class="calendar"
id="calendar">
</div>

</main>

</div>

<script>

/* =========================
FIREBASE CONFIG
========================= */

/*
====================================
ТУТ ПОТРІБНО ВСТАВИТИ ВАШ FIREBASE
====================================

1. Створіть проект Firebase
2. Firestore Database
3. Скопіюйте config
4. Вставте сюди
*/

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain:
    "YOUR_PROJECT.firebaseapp.com",

    projectId:
    "YOUR_PROJECT_ID",

    storageBucket:
    "YOUR_PROJECT.appspot.com",

    messagingSenderId:
    "123456789",

    appId:
    "YOUR_APP_ID"
};

/* =========================
FIREBASE INIT
========================= */

/*
====================================
НОВА ФУНКЦІЯ:
дані синхронізуються
між усіма пристроями
====================================
*/

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================
ELEMENTS
========================= */

const calendar =
document.getElementById("calendar");

const monthYear =
document.getElementById("monthYear");

const sidebar =
document.getElementById("sidebar");

const overlay =
document.querySelector(
".sidebar-overlay"
);

/* =========================
DATE
========================= */

let currentDate =
new Date();

/* =========================
MONTHS
========================= */

const months = [

"Січень","Лютий","Березень",
"Квітень","Травень","Червень",
"Липень","Серпень","Вересень",
"Жовтень","Листопад","Грудень"

];

/* =========================
SHIFTS ARRAY
========================= */

let shifts = [];

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){

    sidebar.classList.toggle(
        "active"
    );

    overlay.classList.toggle(
        "active"
    );
}

function closeSidebar(){

    sidebar.classList.remove(
        "active"
    );

    overlay.classList.remove(
        "active"
    );
}

/* =========================
REALTIME FIREBASE
========================= */

/*
====================================
ГОЛОВНА ЗМІНА:

onSnapshot()

автоматично оновлює
дані на всіх пристроях
в реальному часі
====================================
*/

db.collection("shifts")
.onSnapshot(snapshot => {

    shifts = [];

    snapshot.forEach(doc => {

        shifts.push({

            id: doc.id,

            ...doc.data()
        });
    });

    renderCalendar();
});

/* =========================
CALENDAR
========================= */

function renderCalendar(){

    calendar.innerHTML = "";

    const year =
    currentDate.getFullYear();

    const month =
    currentDate.getMonth();

    monthYear.textContent =
    `${months[month]} ${year}`;

    const firstDay =
    new Date(year, month, 1)
    .getDay();

    const daysInMonth =
    new Date(year, month + 1, 0)
    .getDate();

    const dayNames = [

        "Пн","Вт","Ср",
        "Чт","Пт","Сб","Нд"

    ];

    if(window.innerWidth > 768){

        dayNames.forEach(day => {

            const dayName =
            document.createElement("div");

            dayName.classList.add(
                "day-name"
            );

            dayName.textContent = day;

            calendar.appendChild(dayName);
        });
    }

    let startDay =
    firstDay === 0 ? 6 : firstDay - 1;

    if(window.innerWidth > 768){

        for(let i = 0;
            i < startDay;
            i++){

            const empty =
            document.createElement("div");

            empty.classList.add(
                "day",
                "empty"
            );

            calendar.appendChild(empty);
        }
    }

    for(let day = 1;
        day <= daysInMonth;
        day++){

        const dayDiv =
        document.createElement("div");

        dayDiv.classList.add("day");

        const dayNumber =
        document.createElement("div");

        dayNumber.classList.add(
            "day-number"
        );

        const fullDate =
        `${String(day).padStart(2,'0')}.${String(month + 1).padStart(2,'0')}.${year}`;

        dayNumber.textContent =
        fullDate;

        dayDiv.appendChild(dayNumber);

        const currentDayString =
        `${year}-${String(month + 1)
        .padStart(2,'0')}-${String(day)
        .padStart(2,'0')}`;

        shifts.forEach(shift => {

            if(
                shift.date ===
                currentDayString
            ){

                const event =
                document.createElement("div");

                event.classList.add(
                    "event"
                );

                event.innerHTML = `

                <span
                class="delete-btn"
                onclick="deleteShift('${shift.id}')">

                ×

                </span>

                <strong>
                ${shift.name}
                </strong>

                <small>
                ${shift.note}
                </small>

                `;

                dayDiv.appendChild(event);
            }
        });

        calendar.appendChild(dayDiv);
    }
}

/* =========================
ADD SHIFT
========================= */

/*
====================================
НОВА ФУНКЦІЯ:

дані зберігаються
в Firebase Cloud
====================================
*/

function addShift(){

    const name =
    document.getElementById(
    "employeeName"
    ).value.trim();

    const date =
    document.getElementById(
    "shiftDate"
    ).value;

    const note =
    document.getElementById(
    "note"
    ).value.trim();

    if(name === "" || date === ""){

        alert(
        "Заповніть ім'я та дату"
        );

        return;
    }

    db.collection("shifts").add({

        name,
        date,
        note,
        created:
        firebase.firestore
        .FieldValue
        .serverTimestamp()
    });

    document.getElementById(
    "employeeName"
    ).value = "";

    document.getElementById(
    "shiftDate"
    ).value = "";

    document.getElementById(
    "note"
    ).value = "";

    closeSidebar();
}

/* =========================
DELETE SHIFT
========================= */

/*
====================================
ВИДАЛЕННЯ З FIREBASE
====================================
*/

function deleteShift(id){

    if(confirm(
    "Видалити запис?"
    )){

        db.collection("shifts")
        .doc(id)
        .delete();
    }
}

/* =========================
CLEAR ALL
========================= */

/*
====================================
ОЧИСТКА FIREBASE
====================================
*/

async function clearAllData(){

    if(confirm(
    "Очистити всі дані?"
    )){

        const snapshot =
        await db.collection(
        "shifts"
        ).get();

        snapshot.forEach(doc => {

            doc.ref.delete();
        });
    }
}

/* =========================
MONTH NAVIGATION
========================= */

function prevMonth(){

    currentDate.setMonth(
    currentDate.getMonth() - 1
    );

    renderCalendar();
}

function nextMonth(){

    currentDate.setMonth(
    currentDate.getMonth() + 1
    );

    renderCalendar();
}

/* =========================
AUTO RESIZE
========================= */

window.addEventListener(
"resize",
renderCalendar
);

/* =========================
START
========================= */

renderCalendar();

</script>

</body>
</html>
